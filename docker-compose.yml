services:
  mysql:
    image: mysql:8.4
    container_name: reliable-webhook-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: webhook_platform
      MYSQL_USER: webhook
      MYSQL_PASSWORD: webhook_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u webhook -pwebhook_pass --silent"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build: .
    container_name: reliable-webhook-app
    environment:
      HTTP_ADDR: ":8080"
      MYSQL_DSN: "webhook:webhook_pass@tcp(mysql:3306)/webhook_platform?parseTime=true"
      REQUEST_TIMEOUT: "5s"
      DELIVERY_TIMEOUT: "5s"
      SHUTDOWN_TIMEOUT: "10s"
      WORKER_COUNT: "4"
      QUEUE_SIZE: "16"
      POLL_INTERVAL: "1s"
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql-data:
